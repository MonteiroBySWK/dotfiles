# --- Fontes ---
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Cursor (Sem frescura) ---
cursor_shape     block
shell_integration  disabled
cursor_blink_interval 0
cursor_trail 1

# --- Performance / Sino ---
enable_audio_bell no
window_alert_on_bell no
visual_bell_duration 0.0
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# --- Janela e Opacidade ---
background_opacity 1 
hide_window_decorations yes
confirm_os_window_close 0

# --- Cores (Baseado no Tokyo Night / Sóbrio) ---
#foreground #a9b1d6
#background #1a1b26

# Black
color0 #414868
color8 #414868

# Red
color1 #f7768e
color9 #f7768e

# Green
color2  #73daca
color10 #73daca

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Magenta
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #c0caf5
color15 #c0caf5

# --- Comportamento ---
scrollback_lines 5000
copy_on_select yes
detect_urls yes
url_color #7aa2f7
url_style curly
